<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cat Chase LED Controller</title>
<style>
  :root {
    --bg:       #0a0a0f;
    --surface:  #13131a;
    --border:   #1e1e2e;
    --accent:   #7c5cfc;
    --accent2:  #fc5cf3;
    --text:     #e8e6f0;
    --muted:    #6b6880;
    --on:       #3ddc84;
    --off:      #fc5c5c;
    --radius:   12px;
    --gap:      20px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-size: 15px;
    min-height: 100vh;
    padding: 24px 16px 48px;
  }

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 28px;
    flex-wrap: wrap;
    gap: 12px;
  }

  .logo {
    font-size: 20px;
    font-weight: 700;
    letter-spacing: -0.5px;
    color: var(--text);
  }

  .logo span {
    color: var(--accent);
  }

  /* ── Connection indicator ── */
  .conn {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 6px 14px 6px 10px;
    font-size: 13px;
    color: var(--muted);
    transition: border-color 0.3s;
  }

  .conn.connected {
    border-color: var(--on);
    color: var(--on);
  }

  .conn.disconnected {
    border-color: var(--off);
    color: var(--off);
  }

  .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--muted);
    transition: background 0.3s;
    flex-shrink: 0;
  }

  .conn.connected .dot {
    background: var(--on);
    box-shadow: 0 0 6px var(--on);
    animation: pulse 2s ease-in-out infinite;
  }

  .conn.disconnected .dot {
    background: var(--off);
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50%       { opacity: 0.5; }
  }

  /* ── IP input ── */
  .ip-row {
    display: flex;
    gap: 8px;
    margin-bottom: 24px;
    flex-wrap: wrap;
  }

  .ip-row input {
    flex: 1;
    min-width: 180px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-size: 14px;
    font-family: monospace;
    padding: 10px 14px;
    outline: none;
    transition: border-color 0.2s;
  }

  .ip-row input:focus { border-color: var(--accent); }

  .ip-row input::placeholder { color: var(--muted); }

  .btn {
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: var(--radius);
    padding: 10px 20px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.15s, transform 0.1s;
    white-space: nowrap;
  }

  .btn:hover  { opacity: 0.88; }
  .btn:active { transform: scale(0.97); }

  .btn.secondary {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
  }

  .btn.danger {
    background: #2a1010;
    border: 1px solid var(--off);
    color: var(--off);
  }

  .btn.success {
    background: #0f2a18;
    border: 1px solid var(--on);
    color: var(--on);
  }

  /* ── Cards ── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    margin-bottom: var(--gap);
  }

  .card-title {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 16px;
  }

  /* ── Game controls ── */
  .game-btns {
    display: flex;
    gap: 10px;
  }

  .game-btns .btn {
    flex: 1;
    font-size: 16px;
    padding: 14px;
  }

  /* ── Sliders ── */
  .slider-row {
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .slider-item {
    display: grid;
    grid-template-columns: 110px 1fr 44px;
    align-items: center;
    gap: 12px;
  }

  .slider-label {
    font-size: 13px;
    color: var(--muted);
  }

  input[type=range] {
    -webkit-appearance: none;
    appearance: none;
    width: 100%;
    height: 4px;
    border-radius: 2px;
    background: var(--border);
    outline: none;
    cursor: pointer;
  }

  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 18px;
    height: 18px;
    border-radius: 50%;
    background: var(--accent);
    cursor: pointer;
    box-shadow: 0 0 6px rgba(124,92,252,0.5);
    transition: transform 0.1s;
  }

  input[type=range]::-webkit-slider-thumb:hover {
    transform: scale(1.15);
  }

  input[type=range]::-moz-range-thumb {
    width: 18px;
    height: 18px;
    border-radius: 50%;
    background: var(--accent);
    cursor: pointer;
    border: none;
  }

  .slider-val {
    font-size: 13px;
    font-family: monospace;
    color: var(--text);
    text-align: right;
  }

  /* ── Color mode toggle ── */
  .color-section { display: flex; flex-direction: column; gap: 14px; }

  .toggle-row {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .toggle-label { font-size: 13px; color: var(--muted); }

  .toggle {
    position: relative;
    width: 42px;
    height: 24px;
    flex-shrink: 0;
  }

  .toggle input { opacity: 0; width: 0; height: 0; position: absolute; }

  .toggle-track {
    position: absolute;
    inset: 0;
    background: var(--border);
    border-radius: 12px;
    cursor: pointer;
    transition: background 0.2s;
  }

  .toggle input:checked + .toggle-track { background: var(--accent); }

  .toggle-thumb {
    position: absolute;
    top: 3px;
    left: 3px;
    width: 18px;
    height: 18px;
    background: #fff;
    border-radius: 50%;
    pointer-events: none;
    transition: transform 0.2s;
  }

  .toggle input:checked ~ .toggle-thumb { transform: translateX(18px); }

  /* ── Color picker row ── */
  .color-picker-row {
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }

  input[type=color] {
    -webkit-appearance: none;
    appearance: none;
    width: 48px;
    height: 48px;
    border: 2px solid var(--border);
    border-radius: var(--radius);
    background: none;
    cursor: pointer;
    padding: 2px;
  }

  input[type=color]::-webkit-color-swatch-wrapper { padding: 0; }
  input[type=color]::-webkit-color-swatch { border-radius: 8px; border: none; }

  .preset-colors {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .preset {
    width: 32px;
    height: 32px;
    border-radius: 8px;
    border: 2px solid transparent;
    cursor: pointer;
    transition: transform 0.1s, border-color 0.15s;
  }

  .preset:hover { transform: scale(1.12); }
  .preset.active { border-color: #fff; }

  /* ── Status bar ── */
  .status-bar {
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
  }

  .stat {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .stat-val {
    font-size: 18px;
    font-weight: 700;
    color: var(--text);
    font-variant-numeric: tabular-nums;
  }

  .stat-key {
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }

  /* ── LED preview strip ── */
  #preview {
    width: 100%;
    height: 28px;
    border-radius: 8px;
    overflow: hidden;
    background: #000;
    margin-top: 4px;
  }

  #preview canvas {
    width: 100%;
    height: 100%;
    display: block;
  }

  /* ── Toast ── */
  #toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 8px 20px;
    font-size: 13px;
    color: var(--muted);
    transition: transform 0.25s ease;
    pointer-events: none;
    white-space: nowrap;
  }

  #toast.show { transform: translateX(-50%) translateY(0); }

  @media (max-width: 480px) {
    .slider-item { grid-template-columns: 90px 1fr 36px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">Cat <span>Chase</span> LED</div>
  <div class="conn disconnected" id="conn">
    <div class="dot"></div>
    <span id="conn-label">Not connected</span>
  </div>
</header>

<!-- IP input -->
<div class="ip-row">
  <input type="text" id="ip-input" placeholder="192.168.1.xxx  (ESP32 IP address)" value="">
  <button class="btn secondary" onclick="saveIP()">Connect</button>
</div>

<!-- Game on/off -->
<div class="card">
  <div class="card-title">Game</div>
  <div class="game-btns">
    <button class="btn success" onclick="gameStart()">▶ Start</button>
    <button class="btn danger"  onclick="gameStop()">■ Stop</button>
  </div>
</div>

<!-- Sliders -->
<div class="card">
  <div class="card-title">Controls</div>
  <div class="slider-row">

    <div class="slider-item">
      <span class="slider-label">Speed</span>
      <input type="range" id="s-speed" min="5" max="500" value="60"
             oninput="sliderUpdate('speed', this.value, 'v-speed', 'ms')">
      <span class="slider-val" id="v-speed">60ms</span>
    </div>

    <div class="slider-item">
      <span class="slider-label">Tail length</span>
      <input type="range" id="s-length" min="1" max="30" value="6"
             oninput="sliderUpdate('length', this.value, 'v-length', ' LEDs')">
      <span class="slider-val" id="v-length">6 LEDs</span>
    </div>

    <div class="slider-item">
      <span class="slider-label">Brightness</span>
      <input type="range" id="s-brightness" min="1" max="100" value="40"
             oninput="sliderUpdate('brightness', this.value, 'v-brightness', '%')">
      <span class="slider-val" id="v-brightness">40%</span>
    </div>

  </div>
</div>

<!-- Color -->
<div class="card">
  <div class="card-title">Color</div>
  <div class="color-section">
    <div class="toggle-row">
      <label class="toggle">
        <input type="checkbox" id="auto-color" checked onchange="toggleAutoColor()">
        <div class="toggle-track"></div>
        <div class="toggle-thumb"></div>
      </label>
      <span class="toggle-label" id="auto-label">Rainbow auto-cycle</span>
    </div>

    <div class="color-picker-row" id="color-picker-row" style="opacity:0.3;pointer-events:none">
      <input type="color" id="color-pick" value="#ff4400" oninput="colorPicked(this.value)">
      <div class="preset-colors">
        <div class="preset" style="background:#ff0000" onclick="setPreset('#ff0000')" title="Red"></div>
        <div class="preset" style="background:#ff6600" onclick="setPreset('#ff6600')" title="Orange"></div>
        <div class="preset" style="background:#ffcc00" onclick="setPreset('#ffcc00')" title="Yellow"></div>
        <div class="preset" style="background:#00ff44" onclick="setPreset('#00ff44')" title="Green"></div>
        <div class="preset" style="background:#00ccff" onclick="setPreset('#00ccff')" title="Cyan"></div>
        <div class="preset" style="background:#7c5cfc" onclick="setPreset('#7c5cfc')" title="Purple"></div>
        <div class="preset" style="background:#fc5cf3" onclick="setPreset('#fc5cf3')" title="Pink"></div>
        <div class="preset" style="background:#ffffff" onclick="setPreset('#ffffff')" title="White"></div>
      </div>
    </div>
  </div>
</div>

<!-- LED preview -->
<div class="card">
  <div class="card-title">Live preview</div>
  <div id="preview"><canvas id="preview-canvas"></canvas></div>
</div>

<!-- Status -->
<div class="card">
  <div class="card-title">Status</div>
  <div class="status-bar">
    <div class="stat">
      <span class="stat-val" id="st-running">—</span>
      <span class="stat-key">Game</span>
    </div>
    <div class="stat">
      <span class="stat-val" id="st-speed">—</span>
      <span class="stat-key">Speed</span>
    </div>
    <div class="stat">
      <span class="stat-val" id="st-length">—</span>
      <span class="stat-key">Tail</span>
    </div>
    <div class="stat">
      <span class="stat-val" id="st-brightness">—</span>
      <span class="stat-key">Brightness</span>
    </div>
    <div class="stat">
      <span class="stat-val" id="st-leds">265</span>
      <span class="stat-key">LEDs</span>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
// ── State ────────────────────────────────────────────────────
let espIP       = localStorage.getItem('espIP') || '';
let autoColor   = true;
let chasePos    = 0;
let chaseHue    = 0;
let fixedColor  = [255, 68, 0];
let connected   = false;
let debounceTimer = null;

// pending slider values to batch-send
let pendingSpeed      = null;
let pendingLength     = null;
let pendingBrightness = null;

if (espIP) document.getElementById('ip-input').value = espIP;

// ── Helpers ──────────────────────────────────────────────────
function url(path) { return `http://${espIP}${path}`; }

async function get(path) {
  const r = await fetch(url(path), { signal: AbortSignal.timeout(2000) });
  return r;
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toast._t);
  toast._t = setTimeout(() => t.classList.remove('show'), 2000);
}

function setConnected(on) {
  connected = on;
  const el = document.getElementById('conn');
  const lb = document.getElementById('conn-label');
  el.className = 'conn ' + (on ? 'connected' : 'disconnected');
  lb.textContent = on ? `Connected · ${espIP}` : 'Not connected';
}

// ── IP ───────────────────────────────────────────────────────
function saveIP() {
  espIP = document.getElementById('ip-input').value.trim();
  localStorage.setItem('espIP', espIP);
  toast('Connecting to ' + espIP + '…');
  pollState();
}

// ── Game controls ────────────────────────────────────────────
async function gameStart() {
  if (!espIP) { toast('Enter ESP32 IP first'); return; }
  try {
    await get('/game/start');
    toast('Game started');
  } catch { toast('Could not reach ESP32'); }
}

async function gameStop() {
  if (!espIP) { toast('Enter ESP32 IP first'); return; }
  try {
    await get('/game/stop');
    toast('Game stopped');
  } catch { toast('Could not reach ESP32'); }
}

// ── Sliders ──────────────────────────────────────────────────
function sliderUpdate(param, value, labelId, suffix) {
  document.getElementById(labelId).textContent = value + suffix;

  if (param === 'speed')      pendingSpeed      = value;
  if (param === 'length')     pendingLength     = value;
  if (param === 'brightness') pendingBrightness = value;

  clearTimeout(debounceTimer);
  debounceTimer = setTimeout(sendSliders, 120);
}

async function sendSliders() {
  if (!espIP) return;
  let q = '/game/set?';
  if (pendingSpeed      !== null) { q += `speed=${pendingSpeed}&`;      pendingSpeed = null; }
  if (pendingLength     !== null) { q += `length=${pendingLength}&`;    pendingLength = null; }
  if (pendingBrightness !== null) { q += `brightness=${pendingBrightness}&`; pendingBrightness = null; }
  if (!autoColor) {
    const hex = document.getElementById('color-pick').value.replace('#','');
    q += `color=${hex}&`;
  } else {
    q += 'color=auto&';
  }
  try { await get(q); } catch {}
}

// ── Color ────────────────────────────────────────────────────
function toggleAutoColor() {
  autoColor = document.getElementById('auto-color').checked;
  const row = document.getElementById('color-picker-row');
  const lbl = document.getElementById('auto-label');
  row.style.opacity         = autoColor ? '0.3' : '1';
  row.style.pointerEvents   = autoColor ? 'none' : 'auto';
  lbl.textContent           = autoColor ? 'Rainbow auto-cycle' : 'Fixed color';
  clearTimeout(debounceTimer);
  debounceTimer = setTimeout(sendSliders, 120);
}

function colorPicked(hex) {
  clearTimeout(debounceTimer);
  debounceTimer = setTimeout(sendSliders, 120);
}

function setPreset(hex) {
  document.getElementById('color-pick').value = hex;
  document.querySelectorAll('.preset').forEach(p => p.classList.remove('active'));
  event.target.classList.add('active');
  colorPicked(hex);
}

// ── State polling ────────────────────────────────────────────
async function pollState() {
  if (!espIP) return;
  try {
    const r = await get('/state');
    if (!r.ok) throw new Error();
    const d = await r.json();
    setConnected(true);

    // sync sliders only if user isn't dragging
    if (pendingSpeed === null)
      document.getElementById('s-speed').value = d.speed;
    if (pendingLength === null)
      document.getElementById('s-length').value = d.length;
    if (pendingBrightness === null)
      document.getElementById('s-brightness').value = d.brightness;

    document.getElementById('v-speed').textContent      = d.speed + 'ms';
    document.getElementById('v-length').textContent     = d.length + ' LEDs';
    document.getElementById('v-brightness').textContent = d.brightness + '%';

    document.getElementById('st-running').textContent    = d.running ? 'Running' : 'Stopped';
    document.getElementById('st-speed').textContent      = d.speed + 'ms';
    document.getElementById('st-length').textContent     = d.length + ' LEDs';
    document.getElementById('st-brightness').textContent = d.brightness + '%';
    document.getElementById('st-leds').textContent       = d.numLeds;

    // update preview state
    chaseLength  = d.length;
    chaseRunning = d.running;
    if (!d.autoColor) {
      fixedColor = [d.colorR, d.colorG, d.colorB];
    }

  } catch {
    setConnected(false);
  }
}

setInterval(pollState, 2000);
if (espIP) pollState();

// ── Canvas LED preview ───────────────────────────────────────
const canvas  = document.getElementById('preview-canvas');
const ctx     = canvas.getContext('2d');
const N       = 265;
let chaseLength  = 6;
let chaseRunning = false;

function hsvToRgb(h, s, v) {
  h = (h % 256) / 255 * 360;
  s = s / 255; v = v / 255;
  const c = v * s, x = c * (1 - Math.abs((h / 60) % 2 - 1)), m = v - c;
  let r,g,b;
  if      (h < 60)  { r=c; g=x; b=0; }
  else if (h < 120) { r=x; g=c; b=0; }
  else if (h < 180) { r=0; g=c; b=x; }
  else if (h < 240) { r=0; g=x; b=c; }
  else if (h < 300) { r=x; g=0; b=c; }
  else              { r=c; g=0; b=x; }
  return [(r+m)*255|(0), (g+m)*255|(0), (b+m)*255|(0)];
}

function drawPreview() {
  const W = canvas.parentElement.offsetWidth;
  const H = 28;
  canvas.width  = W;
  canvas.height = H;

  const pw = W / N;
  const ledArr = new Array(N).fill(null).map(() => [0,0,0]);

  // fade existing
  // simple simulation: tail fade
  if (chaseRunning) {
    for (let i = 0; i < N; i++) {
      ledArr[i] = [0,0,0];
    }
    // draw tail
    for (let j = 0; j < chaseLength + 12; j++) {
      const idx = ((chasePos - j) % N + N) % N;
      const fade = Math.max(0, 1 - j / (chaseLength + 12));
      let col;
      if (autoColor) {
        col = hsvToRgb((chaseHue - j * 3 + 256) % 256, 255, 255 * fade);
      } else {
        col = fixedColor.map(c => c * fade);
      }
      ledArr[idx] = col;
    }
  }

  ctx.clearRect(0, 0, W, H);
  for (let i = 0; i < N; i++) {
    const [r,g,b] = ledArr[i];
    ctx.fillStyle = `rgb(${r|0},${g|0},${b|0})`;
    ctx.fillRect(i * pw, 0, Math.max(pw - 0.5, 0.5), H);
  }

  if (chaseRunning) {
    chasePos = (chasePos + 1) % N;
    chaseHue = (chaseHue + 8) % 256;
  }
}

setInterval(drawPreview, 60);
</script>
</body>
</html>
